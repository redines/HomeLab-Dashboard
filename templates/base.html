{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HomeLab Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">🏠 HomeLab Dashboard</h1>
            <nav class="nav">
                <button id="refresh-btn" class="btn btn-primary">
                    <span class="refresh-icon">🔄</span> Refresh Services
                </button>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 HomeLab Dashboard | Last updated: <span id="last-updated">{{ last_updated|date:"Y-m-d H:i:s" }}</span></p>
        </div>
    </footer>

    <script src="{% static 'js/dashboard.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
